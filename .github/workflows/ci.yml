name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout source code from GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install JDK 21 — matches Dockerfile and local dev
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Step 3: Compile + run unit tests + JaCoCo coverage report
      - name: Build and test
        run: ./mvnw -B verify

      # Step 4: Package JAR (skip re-running tests — already verified)
      - name: Package application
        run: ./mvnw -B -DskipTests package

      # Step 5: Upload JAR as artifact (optional — useful for releases)
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ems-app-jar
          path: target/*.jar
          retention-days: 7
