server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter web SPA — serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the Spring Boot backend (same origin, no CORS issues)
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Swagger UI through the same host
    location /swagger-ui.html {
        proxy_pass http://backend:8080/swagger-ui.html;
    }

    location /swagger-ui/ {
        proxy_pass http://backend:8080/swagger-ui/;
    }

    location /api-docs {
        proxy_pass http://backend:8080/api-docs;
    }

    location /v3/api-docs {
        proxy_pass http://backend:8080/v3/api-docs;
    }
}
